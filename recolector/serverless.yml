service: ecoalerta-recolector

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 128
  timeout: 10
  environment:
    RECOLECTOR_TABLE: recolectorEcoAlerta
    RUTA_TABLE: rutaEcoAlerta
  # IAM de minimo privilegio: solo las dos tablas de este servicio (sin Resource "*")
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Scan
          Resource:
            - !GetAtt RecolectorTable.Arn
            - !GetAtt RutaTable.Arn

functions:
  register:
    handler: handler.register
    events:
      - http:
          path: /recolector/register
          method: post
          cors: true
  login:
    handler: handler.login
    events:
      - http:
          path: /recolector/login
          method: post
          cors: true
  registrarRuta:
    handler: handler.registrarRuta
    events:
      - http:
          path: /recolector/rutas
          method: post
          cors: true
  obtenerRutas:
    handler: handler.obtenerRutas
    events:
      - http:
          path: /recolector/rutas
          method: get
          cors: true
  iniciarRuta:
    handler: handler.iniciarRuta
    events:
      - http:
          path: /recolector/iniciar-ruta
          method: post
          cors: true

resources:
  Resources:
    RecolectorTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: recolectorEcoAlerta
        BillingMode: PAY_PER_REQUEST   # on-demand -> menor costo
        AttributeDefinitions:
          - AttributeName: correo
            AttributeType: S
        KeySchema:
          - AttributeName: correo
            KeyType: HASH

    RutaTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: rutaEcoAlerta
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: route_id
            AttributeType: S
        KeySchema:
          - AttributeName: route_id
            KeyType: HASH
