service: ecoalerta-usuarios

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 128
  timeout: 10
  environment:
    USUARIOS_TABLE: usuariosEcoAlerta
    # Tabla de rutas (creada por el servicio recolector) para enriquecer el login.
    RUTA_TABLE: rutaEcoAlerta
  iam:
    role:
      statements:
        # Tabla propia: lectura/escritura del usuario.
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
          Resource:
            - !GetAtt UsuariosTable.Arn
        # Solo lectura de rutaEcoAlerta (otro stack) para devolver el detalle en el login.
        - Effect: Allow
          Action:
            - dynamodb:BatchGetItem
            - dynamodb:GetItem
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/rutaEcoAlerta

functions:
  register:
    handler: handler.register
    events:
      - http:
          path: /usuarios/register
          method: post
          cors: true
  login:
    handler: handler.login
    events:
      - http:
          path: /usuarios/login
          method: post
          cors: true

resources:
  Resources:
    UsuariosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: usuariosEcoAlerta
        BillingMode: PAY_PER_REQUEST   # on-demand: sin capacidad provisionada -> menor costo
        AttributeDefinitions:
          - AttributeName: correo
            AttributeType: S
        KeySchema:
          - AttributeName: correo
            KeyType: HASH
