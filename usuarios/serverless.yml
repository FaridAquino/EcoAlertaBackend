service: ecoalerta-usuarios

provider:
  name: aws
  runtime: python3.12
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 128
  timeout: 10
  environment:
    USUARIOS_TABLE: usuariosEcoAlerta
  # IAM de minimo privilegio: solo la tabla usuariosEcoAlerta (sin Resource "*")
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
          Resource:
            - !GetAtt UsuariosTable.Arn

functions:
  register:
    handler: handler.register
    events:
      - http:
          path: /usuarios/register
          method: post
          cors: true
  login:
    handler: handler.login
    events:
      - http:
          path: /usuarios/login
          method: post
          cors: true

resources:
  Resources:
    UsuariosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: usuariosEcoAlerta
        BillingMode: PAY_PER_REQUEST   # on-demand: sin capacidad provisionada -> menor costo
        AttributeDefinitions:
          - AttributeName: correo
            AttributeType: S
        KeySchema:
          - AttributeName: correo
            KeyType: HASH
